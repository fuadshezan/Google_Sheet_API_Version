<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aesthetico Dashboard</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative blobs */
        body::before {
            content: '';
            position: absolute;
            top: -120px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -100px;
            right: -60px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(168,85,247,0.28) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Card */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .login-header {
            text-align: center;
            padding: 36px 36px 20px;
        }

        .login-logo {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            color: #fff;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }

        .login-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0;
        }

        .login-body {
            padding: 10px 36px 36px;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #f8fafc;
            padding: 11px 14px;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.25);
            color: #f8fafc;
            outline: none;
        }

        .form-control::placeholder { color: #475569; }

        .input-group-text {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #64748b;
            padding: 11px 14px;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        .btn-login {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }

        .btn-login:hover {
            opacity: 0.92;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .alert-danger {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 0.875rem;
            padding: 10px 14px;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 20px 0;
        }

        @media (max-width: 460px) {
            .login-header { padding: 28px 24px 16px; }
            .login-body   { padding: 10px 24px 28px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i class="bi bi-grid-3x3-gap-fill"></i>
            </div>
            <h2>Aesthetico</h2>
            <p>Sign in to your dashboard</p>
        </div>

        <div class="login-body">
            <!-- Error alert -->
            <div class="alert alert-danger d-none mb-3" id="errorAlert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span id="errorMessage"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email"
                               placeholder="name@example.com" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password"
                               placeholder="Enter your password" required>
                    </div>
                </div>

                <button class="btn-login" type="submit" id="btnLogin">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API = "";

        // If already logged in, redirect to dashboard
        (function checkAuth() {
            const token = localStorage.getItem("auth_token");
            if (token) {
                fetch(`${API}/api/me`, {
                    headers: { "Authorization": `Bearer ${token}` }
                })
                .then(res => {
                    if (res.ok) window.location.href = "/";
                })
                .catch(() => {
                    localStorage.removeItem("auth_token");
                    localStorage.removeItem("auth_user");
                });
            }
        })();

        async function handleLogin(e) {
            e.preventDefault();

            const email        = document.getElementById("email").value.trim();
            const password     = document.getElementById("password").value;
            const btn          = document.getElementById("btnLogin");
            const errorAlert   = document.getElementById("errorAlert");
            const errorMessage = document.getElementById("errorMessage");

            errorAlert.classList.add("d-none");

            const originalHTML = btn.innerHTML;
            btn.disabled  = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

            try {
                const res = await fetch(`${API}/api/login`, {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || "Login failed. Please try again.");
                }

                localStorage.setItem("auth_token", data.token);
                localStorage.setItem("auth_user", JSON.stringify({
                    username: data.username,
                    email:    data.email,
                    role:     data.role,
                }));

                window.location.href = "/";

            } catch (err) {
                errorMessage.textContent = err.message;
                errorAlert.classList.remove("d-none");
            } finally {
                btn.disabled  = false;
                btn.innerHTML = originalHTML;
            }
        }
    </script>
</body>
</html>
