<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary Inventory - Aesthetico Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/sheet-common.css">
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner-box">
            <div class="spinner-border text-primary" style="width:2.5rem;height:2.5rem;" role="status"></div>
            <p id="loadingText">Loading...</p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <header class="mobile-topbar d-print-none">
        <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <a href="/" class="mobile-topbar-brand">
            <div class="brand-icon"><i class="bi bi-bar-chart-line-fill"></i></div>
            <span class="brand-name">Aesthetico</span>
        </a>
        <span class="mobile-topbar-title">Summary Inventory</span>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar d-print-none">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="bi bi-bar-chart-line-fill"></i></div>
            <div class="sidebar-brand-text">
                <span class="brand-name">Aesthetico</span>
                <span class="brand-sub">Order Management</span>
            </div>
        </div>
        <div class="sidebar-section-label">Navigation</div>
        <nav id="sheetList"></nav>
        <div class="sidebar-user">
            <div class="sidebar-user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <div>
                    <div class="sidebar-user-name" id="userName">User</div>
                    <span id="userRole" class="badge bg-info" style="font-size:0.68rem;">Role</span>
                </div>
            </div>
            <button onclick="auth.logout()" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div>
                <h4 class="mb-0" id="sheetTitle">Summary Inventory</h4>
                <small class="text-muted" id="sheetInfo">Loading...</small>
            </div>
            <div class="d-flex gap-2">
                <button id="btnRefresh" class="btn btn-sm btn-outline-primary" disabled>
                    <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                </button>
            </div>
        </div>

        <div class="table-container">
            <div id="emptyState" class="empty-state">
                <i class="bi bi-table"></i>
                <h5>No Data</h5>
                <p>Select a sheet from the sidebar to view data.</p>
            </div>
            <div id="tableWrapper" class="d-none">
                <div class="table-responsive-wrapper">
                    <table id="dataTable" class="table table-striped table-hover table-sm mb-0">
                        <thead><tr></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/sheets/summary-inventory.js"></script>
</body>
</html>
