<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Raw - Aesthetico Dashboard</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- DataTables + Bootstrap 5 -->
    <link href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css"
        rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/sheet-common.css">
    <link rel="stylesheet" href="/static/css/sales-raw-modal.css">
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="text-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
            <p class="mt-3 fw-semibold" id="loadingText">Loading...</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Sidebar -->
    <aside class="sidebar d-print-none">
        <div class="p-3 border-bottom">
            <h5 class="mb-0 fw-bold text-primary">
                <i class="bi bi-bar-chart-line-fill me-2"></i>Aesthetico
            </h5>
            <small class="text-muted">Order Management</small>
        </div>
        <nav class="flex-grow-1 py-2" id="sheetList">
            <!-- Populated by JavaScript -->
        </nav>
        <div class="sidebar-user">
            <div class="d-flex align-items-center mb-2">
                <div class="user-avatar me-2" id="userAvatar">A</div>
                <div class="flex-grow-1">
                    <div class="fw-semibold small" id="userName">User</div>
                    <span id="userRole" class="badge bg-info">Role</span>
                </div>
            </div>
            <button onclick="auth.logout()" class="btn btn-sm btn-outline-danger w-100">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div>
                <h4 class="mb-0" id="sheetTitle">Sales Raw</h4>
                <small class="text-muted" id="sheetInfo">Loading...</small>
            </div>
            <div class="d-flex gap-2">
                <button id="btnRefresh" class="btn btn-sm btn-outline-primary" disabled>
                    <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                </button>
                <button id="btnInsert" class="btn btn-sm btn-success" style="display: none;" data-bs-toggle="modal"
                    data-bs-target="#insertOrderModal">
                    <i class="bi bi-plus-lg me-1"></i>Insert Order
                </button>
            </div>
        </div>

        <!-- Table Container -->
        <div class="table-container">
            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <i class="bi bi-table"></i>
                <h5>No Data</h5>
                <p>Select a sheet from the sidebar to view data.</p>
            </div>

            <!-- Table Wrapper -->
            <div id="tableWrapper" class="d-none">
                <table id="dataTable" class="table table-striped table-hover table-sm">
                    <thead>
                        <tr></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Insert Order Modal -->
    <div class="modal fade" id="insertOrderModal" tabindex="-1" aria-labelledby="insertOrderModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="insertOrderModalLabel">
                        <i class="bi bi-cart-plus me-2"></i>Insert New Order
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="insertOrderForm">
                        <!-- Customer Info Section -->
                        <div class="card mb-3">
                            <div class="card-header bg-light">
                                <i class="bi bi-person me-1"></i> Customer Information
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label for="customerName" class="form-label">Customer Name <span
                                                class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="customerName"
                                            placeholder="Enter customer name" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="customerContact" class="form-label">Contact Number <span
                                                class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="customerContact"
                                            placeholder="01XXXXXXXXX" required>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="customerAddress" class="form-label">Address <span
                                                class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="customerAddress"
                                            placeholder="Enter delivery address" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="orderDate" class="form-label">Date <span
                                                class="text-danger">*</span></label>
                                        <input type="date" class="form-control" id="orderDate" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="customerType" class="form-label">Customer Type</label>
                                        <select class="form-select" id="customerType">
                                            <option value="">Select type</option>
                                            <option value="Retail">Retail</option>
                                            #by default, all customers are regular. So, we can set regular as default
                                            value
                                            <option value="Regular" selected>Regular</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="deliveryPlatform" class="form-label">Delivery Platform <span
                                                class="text-danger">*</span></label>
                                        <select class="form-select" id="deliveryPlatform" required>
                                            <option value="">Select platform</option>
                                            <option value="Pathao Inside">Pathao Inside</option>
                                            <option value="Pathao Outside">Pathao Outside</option>
                                            <option value="Steadfast Inside">Steadfast Inside</option>
                                            <option value="Steadfast Outside">Steadfast Outside</option>
                                            <option value="Personal Dev">Personal Dev</option>
                                            <option value="Pathao Subcity">Pathao Subcity</option>
                                            <option value="Steadfast Subcity">Steadfast Subcity</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="deliveryCharge" class="form-label">Delivery Charge</label>
                                        <input type="number" class="form-control" id="deliveryCharge" placeholder="Auto" value="" readonly>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="salesBy" class="form-label">Sales By <span
                                                class="text-danger">*</span></label>
                                        <select class="form-select" id="salesBy" required>
                                            <option value="">Select salesperson</option>
                                            <option value="Orki">Orki</option>
                                            <option value="Munni">Munni</option>
                                            <option value="Mukta">Mukta</option>
                                            <option value="Durba">Durba</option>
                                            <option value="Manajir">Manajir</option>
                                            <option value="Fuad">Fuad</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="TotalPrice" class="form-label">Total Product Price <span
                                                class="text-danger"></span></label>
                                        <input type="number" class="form-control" id="TotalPrice"
                                            placeholder="Enter total price" value="0">
                                    </div>
                                    
                                    <!-- Default value should be zero -->
                                    <div class="col-md-3">
                                        <label for="discountedPrice" class="form-label">Discounted Price <span
                                                class="text-danger"></span></label>
                                        <input type="number" class="form-control" id="discountedPrice"
                                            placeholder="Enter discounted price" value="0" >
                                    </div>
                                    <div class="col-md-3">
                                        <label for="payableAmount" class="form-label">Payable Amount</label>
                                        <input type="number" class="form-control" id="payableAmount" value="0" readonly>
                                    </div>
                                    
                                </div>
                            </div>
                        </div>

                        <!-- Products Section -->
                        <div class="card mb-3">
                            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                                <span><i class="bi bi-box me-1"></i> Products</span>
                                <button type="button" class="btn btn-outline-success btn-sm" id="btnAddProduct">
                                    <i class="bi bi-plus-lg"></i> Add Product
                                </button>
                            </div>
                            <div class="card-body p-0">
                                <div id="productList">
                                    <!-- Product rows added by JS -->
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" id="btnSubmitOrder">
                        <i class="bi bi-check-lg me-1"></i> Submit Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- Core Modules -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/common.js"></script>

    <!-- Sheet-Specific Script -->
    <script src="/static/js/sheets/sales-raw.js"></script>
</body>

</html>
