<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetico Dashboard</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- DataTables + Bootstrap 5 -->
    <link href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <style>
        /* Sidebar */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .sidebar .nav-link {
            color: #495057;
            padding: 10px 20px;
            border-radius: 0;
            font-size: 0.9rem;
        }
        .sidebar .nav-link:hover {
            background: #e9ecef;
        }
        .sidebar .nav-link.active {
            background: #0d6efd;
            color: #fff;
        }

        /* User section at bottom of sidebar */
        .sidebar-user {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid #dee2e6;
            background: #f1f3f5;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0d6efd;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Main content */
        .main-content {
            margin-left: 260px;
            padding: 0;
        }

        /* Top bar */
        .top-bar {
            background: #fff;
            border-bottom: 1px solid #dee2e6;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Table container */
        .table-container {
            padding: 24px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.show {
            display: flex;
        }

        /* DataTable tweaks */
        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 6px 12px;
        }
        table.dataTable {
            font-size: 0.85rem;
        }
        table.dataTable th {
            white-space: nowrap;
            background: #f8f9fa;
        }

        /* Toast container */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        /* ── Product Image Thumbnails ─────────────────────────── */
        .img-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .table-thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #dee2e6;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .table-thumbnail:hover {
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* ── Hover Zoom Popup ─────────────────────────────────── */
        .image-zoom-popup {
            display: none;
            position: fixed;
            z-index: 10001;
            width: 320px;
            height: 380px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            padding: 8px;
            pointer-events: none;
        }
        .image-zoom-popup img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="text-center">
            <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted" id="loadingText">Loading...</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="p-3 border-bottom">
            <h5 class="mb-0">
                <i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>Aesthetico
            </h5>
            <small class="text-muted">Google Sheets Dashboard</small>
        </div>
        <div class="p-2 flex-grow-1" style="overflow-y: auto;">
            <small class="text-uppercase text-muted px-3 d-block mb-2 mt-2" style="font-size:0.7rem;letter-spacing:1px;">Sheets</small>
            <nav class="nav flex-column" id="sheetList">
                <!-- Populated by JS -->
            </nav>
        </div>

        <!-- User Section (bottom of sidebar) -->
        <div class="sidebar-user">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div>
                        <div class="fw-semibold" style="font-size:0.85rem;" id="userName">User</div>
                        <span class="badge bg-secondary" style="font-size:0.7rem;" id="userRole">Role</span>
                    </div>
                </div>
                <button class="btn btn-outline-secondary btn-sm" onclick="logout()" title="Sign out">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div>
                <h5 class="mb-0" id="sheetTitle">Select a sheet</h5>
                <small class="text-muted" id="sheetInfo"></small>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm" onclick="refreshCurrentSheet()" id="btnRefresh" disabled>
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
                <button class="btn btn-primary btn-sm" onclick="updateStatuses()" id="btnUpdate">
                    <i class="bi bi-cloud-download"></i> Update Order Statuses
                </button>
            </div>
        </div>

        <!-- Table Area -->
        <div class="table-container" id="tableContainer">
            <div class="empty-state" id="emptyState">
                <i class="bi bi-table"></i>
                <h4>Welcome to Aesthetico Dashboard</h4>
                <p>Select a sheet from the sidebar to view its data.</p>
            </div>
            <div class="table-responsive d-none" id="tableWrapper">
                <table id="dataTable" class="table table-striped table-hover table-bordered" style="width:100%">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery (required by DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables + Bootstrap 5 -->
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>
    <!-- App JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
