<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetico Dashboard</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/sheet-common.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="text-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
            <p class="mt-3 fw-semibold" id="loadingText">Loading...</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Sidebar -->
    <aside class="sidebar d-print-none">
        <div class="p-3 border-bottom">
            <h5 class="mb-0 fw-bold text-primary">
                <i class="bi bi-bar-chart-line-fill me-2"></i>Aesthetico
            </h5>
            <small class="text-muted">Order Management</small>
        </div>
        <nav class="flex-grow-1 py-2" id="sheetList">
            <!-- Populated by JavaScript -->
        </nav>
        <div class="sidebar-user">
            <div class="d-flex align-items-center mb-2">
                <div class="user-avatar me-2" id="userAvatar">A</div>
                <div class="flex-grow-1">
                    <div class="fw-semibold small" id="userName">User</div>
                    <span id="userRole" class="badge bg-info">Role</span>
                </div>
            </div>
            <button onclick="auth.logout()" class="btn btn-sm btn-outline-danger w-100">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Welcome Section -->
        <div class="dashboard-welcome">
            <div class="container-fluid">
                <h1><i class="bi bi-house-door me-2"></i>Dashboard</h1>
                <p id="welcomeMessage">Welcome back! Select a sheet to view and manage your data.</p>
            </div>
        </div>

        <!-- Sheets Grid -->
        <div id="sheetsGridContainer" class="sheets-grid"></div>

        <!-- No Sheets Message -->
        <div id="noSheetsMessage" class="no-sheets-message d-none">
            <i class="bi bi-inbox"></i>
            <h5>No Sheets Available</h5>
            <p>You don't have access to any sheets. Contact your administrator.</p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Core Modules -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/common.js"></script>

    <!-- Dashboard Script -->
    <script>
        (function() {
            // Sheet metadata
            const SHEET_INFO = {
                "Sales": {
                    icon: "bi-cart-check",
                    iconClass: "sales",
                    description: "View and manage sales orders with delivery status tracking"
                },
                "Sales Raw": {
                    icon: "bi-file-earmark-plus",
                    iconClass: "sales",
                    description: "Insert new orders and raw sales data entry"
                },
                "Inventory": {
                    icon: "bi-box-seam",
                    iconClass: "inventory",
                    description: "Product inventory with images and stock information"
                },
                "Summary Inventory": {
                    icon: "bi-clipboard-data",
                    iconClass: "inventory",
                    description: "Summarized view of inventory levels and metrics"
                },
                "Input Inventory": {
                    icon: "bi-input-cursor",
                    iconClass: "inventory",
                    description: "Input and update inventory stock levels (Admin only)"
                },
                "Expenses": {
                    icon: "bi-wallet2",
                    iconClass: "expenses",
                    description: "Track and manage business expenses (Admin only)"
                },
                "Product Purchase": {
                    icon: "bi-bag-check",
                    iconClass: "inventory",
                    description: "Product purchase orders and procurement (Admin only)"
                },
                "Information": {
                    icon: "bi-info-circle",
                    iconClass: "information",
                    description: "General information and reference data"
                }
            };

            async function loadSheets() {
                ui.showLoading("Loading sheets...");
                try {
                    const data = await api.fetchSheets();
                    ui.populateSidebar(data.sheets);
                    renderSheetCards(data.sheets);
                    
                    if (data.sheets.length === 0) {
                        document.getElementById("noSheetsMessage").classList.remove("d-none");
                        document.getElementById("sheetsGridContainer").style.display = "none";
                    }
                } catch (err) {
                    ui.showToast(`Failed to load sheets: ${err.message}`, "danger");
                } finally {
                    ui.hideLoading();
                }
            }

            function renderSheetCards(sheets) {
                const container = document.getElementById("sheetsGridContainer");
                container.innerHTML = "";

                sheets.forEach(sheet => {
                    const info = SHEET_INFO[sheet.name] || {
                        icon: "bi-file-earmark-text",
                        iconClass: "default",
                        description: "View and manage sheet data"
                    };

                    const card = document.createElement("a");
                    card.href = common.getSheetUrl(sheet.name);
                    card.className = "sheet-card";
                    
                    card.innerHTML = `
                        <div class="sheet-card-icon ${info.iconClass}">
                            <i class="bi ${info.icon}"></i>
                        </div>
                        <div class="sheet-card-title">${sheet.name}</div>
                        <div class="sheet-card-description">${info.description}</div>
                        <div class="sheet-card-footer">
                            <span>
                                <i class="bi bi-arrow-right-circle"></i> View Sheet
                            </span>
                            ${sheet.header_row > 1 ? `<span class="sheet-card-badge bg-secondary">Row ${sheet.header_row}</span>` : ''}
                        </div>
                    `;

                    container.appendChild(card);
                });
            }

            function updateWelcomeMessage() {
                const user = auth.getCurrentUser();
                if (user) {
                    const welcomeEl = document.getElementById("welcomeMessage");
                    const hour = new Date().getHours();
                    let greeting = "Welcome back";
                    if (hour < 12) greeting = "Good morning";
                    else if (hour < 18) greeting = "Good afternoon";
                    else greeting = "Good evening";
                    
                    welcomeEl.textContent = `${greeting}, ${user.username}! Select a sheet to view and manage your data.`;
                }
            }

            // Initialize on page load
            document.addEventListener("DOMContentLoaded", () => {
                if (!auth.checkAuth()) return;
                
                ui.setupUserProfile();
                updateWelcomeMessage();
                loadSheets();
            });
        })();
    </script>
</body>
</html>
